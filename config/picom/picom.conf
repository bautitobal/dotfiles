###################################
# PICOM - Bauti's minimal for X11 #
###################################

backend = "glx";
vsync = false; # disable if you have an nvidia gpu

#################################
# Corners / rounded look
#################################

corner-radius = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "class_g = 'Rofi'"
];

#################################
# Shadows
#################################

shadow = true;
shadow-radius = 12;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-opacity = 0.18;

shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'Dunst'",
  "_GTK_FRAME_EXTENTS"
];

#################################
# Fading / fast animations
#################################

fading = true;
fade-in-step = 0.08;
fade-out-step = 0.08;
fade-delta = 5;

#################################
# Transparency
#################################

inactive-opacity = 0.92;
active-opacity = 0.97;
frame-opacity = 0.90;

inactive-opacity-override = false;
detect-client-opacity = true;

opacity-rule = [
  "100:class_g = 'Rofi'",
  "100:class_g = 'Polybar'",
  "100:class_g = 'Dunst'",
  "95:class_g = 'obsidian'",
  "94:class_g = 'Brave-browser'",
  "94:class_g = 'firefox'",
  "92:class_g = 'kitty'",
  "92:class_g = 'Alacritty'",
  "92:class_g = 'Thunar'"
];

#################################
# Blur
#################################

blur-method = "dual_kawase";
blur-strength = 4;

blur-background = false;
blur-background-frame = false;
blur-background-fixed = false;

#################################
# General behavior
#################################

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-leader = true;
detect-transient = true;
use-damage = true;

#################################
# Window type settings
#################################

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.95; focus = true; };
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.97; };
  dropdown_menu = { opacity = 0.97; };
};
