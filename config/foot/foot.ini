# ──────────────────────────────────────────────
# Foot Terminal — Nord Detective Theme
# ──────────────────────────────────────────────

[main]
font=JetBrainsMono Nerd Font:size=13
pad=8x6
dpi-aware=yes
bold-text-in-bright=yes

[cursor]
style=block
blink=yes

[scrollback]
lines=10000
indicator-position=relative

[colors-dark]
# Nord palette
foreground=d8dee9
background=2e3440

regular0=3b4252
regular1=bf616a
regular2=a3be8c
regular3=ebcb8b
regular4=81a1c1
regular5=b48ead
regular6=88c0d0
regular7=e5e9f0

bright0=4c566a
bright1=bf616a
bright2=a3be8c
bright3=ebcb8b
bright4=81a1c1
bright5=b48ead
bright6=8fbcbb
bright7=eceff4

# selection
selection-foreground=2e3440
selection-background=88c0d0

# cursor in [colors] (nuevo formato)
cursor=88c0d0 d8dee9

# transparency (0–1)
alpha=0.96

