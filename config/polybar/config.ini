include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini

[bar/main]
width = 100%
height = 30
radius = 0

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 0
border-size = 0

padding-left = 2
padding-right = 2

module-margin = 1

font-0 = JetBrainsMono Nerd Font:style=Regular:size=10
font-1 = JetBrainsMono Nerd Font:style=Medium:size=10

modules-left = i3
modules-center = date
modules-right = network volume mic cpu memory temp battery

wm-restack = i3
override-redirect = false

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
