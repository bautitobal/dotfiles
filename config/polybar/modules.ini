[module/i3]
type = internal/i3
pin-workspaces = true
index-sort = true
enable-click = true
enable-scroll = true
reverse-scroll = false
wrapping-scroll = false

format = <label-state>

label-focused = %index%
label-focused-foreground = ${colors.bg}
label-focused-background = ${colors.blue}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.fg}
label-unfocused-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.cyan}
label-visible-padding = 2

label-urgent = %index%
label-urgent-foreground = ${colors.bg}
label-urgent-background = ${colors.red}
label-urgent-padding = 2


[module/date]
type = custom/script
exec = ~/dotfiles/scripts/bar/date.sh
interval = 1
format = <label>
format-foreground = ${colors.cyan}


[module/network]
type = custom/script
exec = ~/dotfiles/scripts/bar/network.sh
interval = 3
format = <label>
format-foreground = ${colors.green}
click-left = kitty -e nmtui




[module/volume]
type = custom/script
exec = ~/dotfiles/scripts/bar/volume.sh
interval = 1
format = <label>
format-foreground = ${colors.blue}
click-left = pavucontrol
scroll-up = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
scroll-down = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
click-right = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

[module/mic]
type = custom/script
exec = ~/dotfiles/scripts/bar/mic.sh
interval = 1
format = <label>
format-foreground = ${colors.orange}
click-left = pavucontrol


[module/cpu]
type = custom/script
exec = ~/dotfiles/scripts/bar/cpu.sh
interval = 2
format = <label>
format-foreground = ${colors.yellow}
click-left = gnome-system-monitor


[module/memory]
type = custom/script
exec = ~/dotfiles/scripts/bar/memory.sh
interval = 3
format = <label>
format-foreground = ${colors.purple}
click-left = kitty -e btop


[module/temp]
type = custom/script
exec = ~/dotfiles/scripts/bar/temp.sh
interval = 5
format = <label>
format-foreground = ${colors.orange}
click-left = kitty -e btop


[module/battery]
type = custom/script
exec = ~/dotfiles/scripts/bar/battery.sh
interval = 15
format = <label>
format-foreground = ${colors.green}
click-left = tlpui
